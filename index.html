<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteirinha USP</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonte similar -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f2f2f2;
            font-family: 'Roboto', sans-serif;
            margin: 0;
        }

        /* Barra superior */
        .top-bar {
            background-color: #0b7d75;
            color: white;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 500;
        }

        .card-container {
            max-width: 400px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.08);
        }

        .logo {
            width: 110px;
            margin: 15px auto 5px auto;
            display: block;
        }

        .student-photo {
            width: 110px;
            height: 140px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 10px;
        }

        .student-info {
            font-size: 13px;
            margin-top: 10px;
            line-height: 1.4;
        }

        .student-name {
            font-weight: 600;
            font-size: 14px;
        }

        .qr-container {
            margin: 25px 0;
        }

        #qrcode {
            width: 220px;
            height: 220px;
            margin: 0 auto;
        }

        .footer-time {
            font-size: 12px;
            color: #666;
            margin-top: 20px;
            padding-bottom: 20px;
        }

        /* Barra inferior simulando Android */
        .bottom-bar {
            background-color: #000;
            height: 35px;
        }
    </style>
</head>
<body>

<div class="card-container">

    <!-- Topo -->
    <div class="top-bar d-flex align-items-center">
        <span> Card</span>
    </div>

    <!-- Conteúdo -->
    <div class="text-center p-3">

        <!-- LOGO (troque o link) -->
        <img src="https://files.cercomp.ufg.br/weby/up/749/o/university-of-sao-paulo-logo-freelogovectors.net_.webp?1686661341" class="logo" alt="Logo USP">

        <!-- Foto -->
        <img src="WhatsApp Image 2026-02-18 at 18.52.052.jpeg" class="student-photo" alt="Foto do aluno">

        <div class="student-info">
            <div class="student-name">JULIANA BARBOSA MANSO</div>
            <div>R.A: 10324125</div>
            <div>Faculdade de Filosofia, Letras e Ciências Humanas </div>
            <div>Curso: Letras </div>
        </div>

        <!-- QR Code -->
        <div class="qr-container">
            <div id="qrcode"></div>
        </div>

        <!-- Data e Hora -->
        <div class="footer-time" id="datetime"></div>

    </div>

    <!-- Barra inferior -->
    <div class="bottom-bar"></div>

</div>

<!-- Biblioteca QRCode -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
    // GERAR QR CODE
    new QRCode(document.getElementById("qrcode"), {
        text: "https://usp.br/verificacao/12345678",
        width: 220,
        height: 220,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });

    // Data e hora automática
    function atualizarDataHora() {
        const agora = new Date();
        const formato = agora.toLocaleString('pt-BR');
        document.getElementById("datetime").innerText = formato;
    }

    atualizarDataHora();
    setInterval(atualizarDataHora, 1000);
</script>

</body>
</html>
